# 使用语言
language: node_js
# node版本
node_js: stable
# 设置只监听哪个分支
branches:
  only:
  - test
# 缓存，可以节省集成的时间，这里我用了yarn，如果不用可以删除
cache:
  apt: true
  yarn: true
  directories:
    - node_modules
# tarvis生命周期执行顺序详见官网文档
before_install:
- git config --global user.name "NoviceDuke"
- git config --global user.email "duke00360753@gmail.com"
# 由于使用了yarn，所以需要下载，如不用yarn这两行可以删除
- curl -o- -L https://yarnpkg.com/install.sh | bash
- export PATH=$HOME/.yarn/bin:$PATH
install:
# 不用yarn的话这里改成 npm i 即可
- yarn install --pure-lockfile
script:
- hexo clean
- hexo generate
after_success:
- git clone https://github.com/NoviceDuke/blog.git .deploy_git
- cd .deploy_git
- git checkout master
- cd ../
- mv .deploy_git/.git/ ./public/
- cd ./public
- git add .
- git commit -m "Travis CI Auto Builder at `date +"%Y-%m-%d %H:%M"`"
#- cd ./public
#- git init
#- git add --all .
#- git commit -m "Travis CI Auto Builder"
# 这里的 REPO_TOKEN 即之前在 travis 项目的环境变量里添加的
#https://github.com/NoviceDuke/blog.git
- git push --quiet --force "https://$token@github.com/NoviceDuke/blog.git"
  master:master
